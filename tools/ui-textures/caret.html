<!doctype html><html><head><meta charset="UTF-8"/>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:3px;height:10px;overflow:hidden;background:#00000000}
.px{position:absolute;width:1px;height:1px}</style></head>
<body><div id="root" data-composition-id="main" data-start="0" data-duration="1" data-width="3" data-height="10"
style="position:relative;width:3px;height:10px;overflow:hidden">
<div class="clip" data-start="0" data-duration="1" data-track-index="1" style="position:absolute;inset:0" id="grid"></div></div>
<script>window.__timelines=window.__timelines||{};window.__timelines["main"]=gsap.timeline({paused:true});
// Text caret, explicit pixel grid (tip.html technique): K=#352818 brown outline + caps, A=#E3A23A amber core.
// Brown-capped amber vertical bar — chunky Cottage look, blitted at native 3x10 (no AA / scaling).
var PAL={".":null,"K":"#352818","A":"#E3A23A"};
var PAT=["KKK","KAK","KAK","KAK","KAK","KAK","KAK","KAK","KAK","KKK"];
var grid=document.getElementById('grid');
for(var y=0;y<PAT.length;y++){var row=PAT[y];for(var x=0;x<row.length;x++){var col=PAL[row[x]];if(col){var d=document.createElement('div');d.className='px';d.style.left=x+'px';d.style.top=y+'px';d.style.background=col;grid.appendChild(d);}}}
</script></body></html>
