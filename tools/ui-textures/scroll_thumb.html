<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:4px;height:10px;overflow:hidden;background:#00000000}
.s{position:absolute;inset:0;background:#CBA87B;border:1px solid #352818}</style></head>
<body><div id="root" data-composition-id="main" data-start="0" data-duration="1" data-width="4" data-height="10"
