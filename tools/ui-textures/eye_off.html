<!doctype html><html><head><meta charset="UTF-8"/>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:32px;height:32px;overflow:hidden;background:#00000000}
/* Square eye-off (Cottage WARM): block + a dark-brown diagonal slash. Transparent bg via
   `hyperframes render --format png-sequence` — the slash antialiases to transparent, no white fringe. */
.lens{position:absolute;left:3px;top:7px;width:26px;height:18px;background:#E3A23A;border:4px solid #352818}
.slash{position:absolute;left:1px;top:13px;width:30px;height:5px;background:#352818;transform:rotate(38deg);transform-origin:center}</style></head>
<body><div id="root" data-composition-id="main" data-start="0" data-duration="1" data-width="32" data-height="32"
style="position:relative;width:32px;height:32px;overflow:hidden">
<div class="clip" data-start="0" data-duration="1" data-track-index="1" style="position:absolute;inset:0">
<div class="lens"></div><div class="slash"></div></div></div>
<script>window.__timelines=window.__timelines||{};window.__timelines["main"]=gsap.timeline({paused:true})</script></body></html>
