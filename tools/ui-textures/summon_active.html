<!doctype html><html><head><meta charset="UTF-8"/>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:26px;height:26px;overflow:hidden;background:#00000000}
.c{position:absolute;inset:0;background:#D8B98A;border:2px solid #5A3A1E}
.hb{position:absolute;left:6px;top:11px;width:14px;height:4px;background:#5A3A1E}
.vb{position:absolute;left:11px;top:6px;width:4px;height:14px;background:#5A3A1E}</style></head>
<body><div id="root" data-composition-id="main" data-start="0" data-duration="1" data-width="26" data-height="26"
style="position:relative;width:26px;height:26px;overflow:hidden">
<div class="clip" data-start="0" data-duration="1" data-track-index="1" style="position:absolute;inset:0">
<div class="c"></div><div class="hb"></div><div class="vb"></div></div></div>
<script>window.__timelines=window.__timelines||{};window.__timelines["main"]=gsap.timeline({paused:true})</script></body></html>
